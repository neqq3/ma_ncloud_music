name: Publish Domestic Mirror

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish_domestic:
    runs-on: ubuntu-latest
    steps:
      - name: Check GitCode configuration
        id: gitcode_check
        run: |
          if [ -n "$GITCODE_TOKEN" ] && [ -n "$TARGET_REPO" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "target_repo=$TARGET_REPO" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          TARGET_REPO: ${{ secrets.GITCODE_REPO || github.repository }}

      - name: Skip when GitCode is not configured
        if: steps.gitcode_check.outputs.enabled != 'true'
        run: |
          echo "GitCode publish skipped."
          echo "Please configure secrets.GITCODE_TOKEN and optionally secrets.GITCODE_REPO."

      - name: Checkout upstream git history
        if: steps.gitcode_check.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push branch/tag to GitCode (preserve commit history)
        if: steps.gitcode_check.outputs.enabled == 'true'
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          GITCODE_REPO: ${{ steps.gitcode_check.outputs.target_repo }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -e

          GITCODE_USER="$(echo "$GITCODE_REPO" | cut -d'/' -f1)"
          GITCODE_URL="https://${GITCODE_USER}:${GITCODE_TOKEN}@gitcode.com/${GITCODE_REPO}.git"

          git remote remove domestic 2>/dev/null || true
          git remote add domestic "$GITCODE_URL"

          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "Syncing tag: $GITHUB_REF_NAME"
            git push domestic "refs/tags/$GITHUB_REF_NAME:refs/tags/$GITHUB_REF_NAME" --force
          else
            echo "Syncing branch: $GITHUB_REF_NAME"
            git push domestic "HEAD:refs/heads/$GITHUB_REF_NAME" --force
          fi
